<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZHANG</title>
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #111111;
            --metal-btn: linear-gradient(145deg, #2c2c2c, #1a1a1a);
            --neon-blue-green: linear-gradient(90deg, #00f2ff, #00ff88);
            --neon-orange: #ff6600;
            --glow-blue: rgba(0, 162, 255, 0.3);
            --text-gray: #bbbbbb;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, #001f3f 0%, #050505 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            user-select: none; /* Mencegah seleksi teks saat klik tombol */
        }

        .calculator-container {
            background: var(--panel-bg);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid #333;
            box-shadow: 0 0 60px var(--glow-blue);
            width: 380px;
        }

        .brand-logo {
            text-align: center;
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0 0 20px 0;
            background: var(--neon-blue-green);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px #00f2ff);
            letter-spacing: 8px;
            text-transform: uppercase;
        }

        .display {
            background: #000;
            color: #00ff88;
            padding: 25px;
            text-align: right;
            font-size: 2.2rem; /* Diperkecil sedikit agar angka panjang muat */
            font-family: 'Courier New', monospace; /* Font monospaced agar serasi */
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px solid #222;
            box-shadow: inset 0 0 15px #000;
            min-height: 50px;
            word-wrap: break-word; /* Angka panjang akan turun ke bawah */
        }

        .grid-container { display: flex; flex-direction: column; gap: 15px; }

        .functions-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .btn-func {
            background: transparent;
            color: #fff;
            border: 1.5px solid var(--neon-orange);
            border-radius: 6px;
            padding: 12px 5px;
            font-size: 0.65rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 102, 0, 0.2);
            transition: 0.2s;
        }

        .btn-func:hover {
            background: var(--neon-orange);
            color: #000;
            box-shadow: 0 0 15px var(--neon-orange);
        }

        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn-num {
            background: var(--metal-btn);
            color: var(--text-gray);
            border: 1px solid #444;
            border-radius: 10px;
            height: 60px;
            font-size: 1.4rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-num:hover { color: #fff; border-color: #666; transform: translateY(-1px); }
        .btn-num:active { transform: translateY(1px); }

        .btn-solve {
            width: 100%;
            margin-top: 15px;
            background: var(--neon-orange);
            color: #000;
            border: none;
            border-radius: 50px;
            padding: 18px;
            font-size: 1.5rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-orange);
            letter-spacing: 3px;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <h1 class="brand-logo">ZHANG</h1>
        <div class="display" id="screen">0</div>

        <div class="grid-container">
            <div class="functions-grid">
                <button class="btn-func" onclick="clearAllScreen()">CLEAR</button>
                <button class="btn-func" onclick="appendOperator('%')">PERCENTAGE</button>
                <button class="btn-func" onclick="backspace()">REDUCE (DEL)</button>
                <button class="btn-func" title="Segera Hadir">BALANCE</button>
                <button class="btn-func" title="Segera Hadir">ACCUMULATE</button>
                <button class="btn-func" title="Segera Hadir">DISTRIBUTE</button>
            </div>

            <div class="numpad">
                <button class="btn-num" onclick="press('7')">7</button>
                <button class="btn-num" onclick="press('8')">8</button>
                <button class="btn-num" onclick="press('9')">9</button>
                <button class="btn-num" onclick="appendOperator('/')" style="color: var(--neon-orange);">÷</button>
                
                <button class="btn-num" onclick="press('4')">4</button>
                <button class="btn-num" onclick="press('5')">5</button>
                <button class="btn-num" onclick="press('6')">6</button>
                <button class="btn-num" onclick="appendOperator('*')" style="color: var(--neon-orange);">×</button>
                
                <button class="btn-num" onclick="press('1')">1</button>
                <button class="btn-num" onclick="press('2')">2</button>
                <button class="btn-num" onclick="press('3')">3</button>
                <button class="btn-num" onclick="appendOperator('-')" style="color: var(--neon-orange);">-</button>
                
                <button class="btn-num" onclick="press('0')">0</button>
                <button class="btn-num" onclick="press('.')">.</button>
                
                <button class="btn-num" onclick="backspace()" style="color: #ff3333;" id="backspaceBtn">⌫</button>
                
                <button class="btn-num" onclick="appendOperator('+')" style="color: var(--neon-orange);">+</button>
            </div>

            <button class="btn-solve" onclick="calculate()">SOLVE</button>
        </div>
    </div>

    <script>
        let screen = document.getElementById('screen');
        let currentInput = "0";

        function updateScreen() {
            // Jika currentInput kosong setelah dihapus, reset jadi 0
            if (currentInput === "" || currentInput === "NaN" || currentInput === "undefined") {
                currentInput = "0";
            }
            screen.innerText = currentInput;
        }

        function press(num) {
            // Jika layar menampilkan ERROR atau '0' awal, ganti angka
            if (screen.innerText === "ERROR" || currentInput === "0") {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateScreen();
        }

        function appendOperator(op) {
            if (screen.innerText === "ERROR") return; // Jangan tambahkan operator jika error
            
            let lastChar = currentInput.slice(-1);
            if (['+', '-', '*', '/', '%'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + op;
            } else {
                currentInput += op;
            }
            updateScreen();
        }

        // Fungsi baru untuk menghapus semua (Sesuai dengan tombol CLEAR)
        function clearAllScreen() {
            currentInput = "0";
            updateScreen();
        }

        // INI LOGIKA UNTUK MENGHAPUS SATU PER SATU (Backspace)
        function backspace() {
            if (screen.innerText === "ERROR" || currentInput === "0") {
                // Jika error atau sudah 0, jangan lakukan apa-apa
                clearAllScreen(); 
                return;
            }

            // Hapus karakter terakhir
            currentInput = currentInput.slice(0, -1);
            updateScreen();
        }

        function calculate() {
            try {
                if (currentInput === "0" || currentInput === "") return;

                let processedInput = currentInput.replace(/%/g, '/100');
                
                // Gunakan eval() dengan hati-hati. Untuk demo ini sudah cukup.
                let result = eval(processedInput);
                
                // Cek pembagian dengan nol
                if (!isFinite(result)) {
                    throw new Error("Div0");
                }

                currentInput = result.toString();
                updateScreen();
            } catch (e) {
                screen.innerText = "ERROR";
                currentInput = "ERROR"; // Set agar press() bisa meresetnya
            }
        }
    </script>
</body>
</html>
